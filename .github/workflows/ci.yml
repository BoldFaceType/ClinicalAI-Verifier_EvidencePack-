name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install "ruff>=0.11,<0.12"
      - run: ruff check src/ tests/

  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -e ".[dev]" pydantic
      - run: PYTHONPATH=src python -m unittest discover -s tests -v

  validate:
    name: CLI smoke test
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e . pydantic
      - name: Write smoke CSV
        run: |
          python - <<'EOF'
          import csv, pathlib
          fields = ["member_id","measure_id","screening_date","screening_tool",
                    "screening_score","screening_loinc","bipolar_history",
                    "prior_year_depression_dx","source_kind","follow_up_code",
                    "follow_up_date","measure_year"]
          row = dict.fromkeys(fields, "")
          row.update({"member_id":"SMOKE001","measure_id":"DSF-E",
                      "screening_date":"2024-03-15","screening_tool":"PHQ-9",
                      "screening_score":"5","screening_loinc":"44261-6",
                      "bipolar_history":"false","prior_year_depression_dx":"false",
                      "source_kind":"structured"})
          p = pathlib.Path("smoke_test.csv")
          with p.open("w", newline="") as f:
            w = csv.DictWriter(f, fieldnames=fields); w.writeheader(); w.writerow(row)
          EOF
      - run: validate-dsfe smoke_test.csv out/smoke
      - run: |
          test -f out/smoke/findings.json   && echo OK
          test -f out/smoke/summary.md      && echo OK
          test -f out/smoke/findings.csv    && echo OK
          test -f out/smoke/per_member.json && echo OK
